<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaCalc</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h1>NovaCalc</h1>

<p>Scientific Calculator</p>

</header>



<!-- Calculator Page -->

<section id="calculatorPage">


<div class="display-box">

<div id="previous"></div>

<input id="display" readonly>

</div>



<div class="scientific">

<button onclick="scientific('sin')">sin</button>
<button onclick="scientific('cos')">cos</button>
<button onclick="scientific('tan')">tan</button>
<button onclick="scientific('sqrt')">√</button>

<button onclick="scientific('log')">log</button>
<button onclick="scientific('ln')">ln</button>
<button onclick="square()">x²</button>
<button onclick="power()">xʸ</button>

</div>




<div class="buttons">

<button onclick="clearDisplay()" class="gray">AC</button>
<button onclick="deleteLast()" class="gray">DEL</button>
<button onclick="append('%')" class="gray">%</button>
<button onclick="append('/')" class="orange">÷</button>


<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')" class="orange">×</button>


<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')" class="orange">−</button>


<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')" class="orange">+</button>


<button onclick="append('0')" class="zero">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()" class="orange">=</button>


</div>


</section>



<!-- History Page -->

<section id="historyPage" class="hide">


<h2>History</h2>

<div id="historyList"></div>


<button onclick="clearHistory()">
Clear History
</button>


</section>




<!-- Settings Page -->

<section id="settingsPage" class="hide">


<h2>Settings</h2>


<div class="setting">

Dark Mode

<button onclick="toggleTheme()">
Toggle
</button>

</div>



<div class="setting">

Button Sound

<button onclick="toggleSound()">
ON/OFF
</button>

</div>


<p class="version">
NovaCalc v1.3
</p>


</section>




<!-- Bottom Navigation -->


<nav>

<button onclick="showPage('calculatorPage')">
🧮
<br>
Calculator
</button>


<button onclick="showPage('historyPage')">
📜
<br>
History
</button>


<button onclick="showPage('settingsPage')">
⚙️
<br>
Settings
</button>


</nav>


</div>


<script src="script.js"></script>


</body>

</html>
