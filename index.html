<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaCalc</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h1>NovaCalc</h1>
<p>Scientific Calculator</p>

</header>



<section id="calculatorPage">


<div class="display-box">

<div id="previous"></div>

<input id="display" readonly>

</div>



<div class="scientific">

<button onclick="scientific('sin')">sin</button>
<button onclick="scientific('cos')">cos</button>
<button onclick="scientific('tan')">tan</button>
<button onclick="scientific('sqrt')">√</button>

<button onclick="scientific('log')">log</button>
<button onclick="scientific('ln')">ln</button>
<button onclick="square()">x²</button>
<button onclick="power()">xʸ</button>

</div>




<div class="buttons">


<button class="gray" onclick="clearDisplay()">AC</button>

<button class="gray" onclick="deleteLast()">DEL</button>

<button class="gray" onclick="append('%')">%</button>

<button class="orange" onclick="append('/')">÷</button>



<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>

<button class="orange" onclick="append('*')">×</button>



<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>

<button class="orange" onclick="append('-')">−</button>



<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>

<button class="orange" onclick="append('+')">+</button>



<button class="zero" onclick="append('0')">0</button>

<button onclick="append('.')">.</button>

<button class="orange" onclick="calculate()">=</button>



</div>


</section>




<section id="historyPage" class="hide">


<h2>History</h2>

<div id="historyList"></div>


<button onclick="clearHistory()">
Clear History
</button>


</section>




<section id="settingsPage" class="hide">


<h2>Settings</h2>


<div class="setting">

<p>Theme</p>

<button onclick="toggleTheme()">
Change
</button>

</div>



<div class="setting">

<p>Sound</p>

<button onclick="toggleSound()">
ON/OFF
</button>

</div>



<p>
NovaCalc v1.3
</p>


</section>





<nav>


<button onclick="showPage('calculatorPage')">

🧮
<br>
Calculator

</button>



<button onclick="showPage('historyPage')">

📜
<br>
History

</button>



<button onclick="showPage('settingsPage')">

⚙️
<br>
Settings

</button>



</nav>


</div>



<script src="script.js"></script>


</body>

</html>
