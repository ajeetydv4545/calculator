<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaCalc</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="top">

<h1>NovaCalc</h1>

<p>Scientific Calculator</p>

<button id="theme">🌙</button>

</div>



<div class="calculator">


<div class="display-box">

<div id="history"></div>

<input id="display" readonly>

</div>



<div class="scientific">


<button onclick="scientific('sin')">sin</button>
<button onclick="scientific('cos')">cos</button>
<button onclick="scientific('tan')">tan</button>
<button onclick="scientific('sqrt')">√</button>

<button onclick="scientific('log')">log</button>
<button onclick="scientific('ln')">ln</button>
<button onclick="square()">x²</button>
<button onclick="power()">xʸ</button>

</div>




<div class="buttons">


<button class="function" onclick="clearDisplay()">AC</button>

<button class="function" onclick="deleteLast()">DEL</button>

<button class="function" onclick="append('%')">%</button>

<button class="operator" onclick="append('/')">÷</button>



<button onclick="append('7')">7</button>

<button onclick="append('8')">8</button>

<button onclick="append('9')">9</button>

<button class="operator" onclick="append('*')">×</button>



<button onclick="append('4')">4</button>

<button onclick="append('5')">5</button>

<button onclick="append('6')">6</button>

<button class="operator" onclick="append('-')">−</button>



<button onclick="append('1')">1</button>

<button onclick="append('2')">2</button>

<button onclick="append('3')">3</button>

<button class="operator" onclick="append('+')">+</button>



<button class="zero" onclick="append('0')">0</button>

<button onclick="append('.')">.</button>

<button class="equal" onclick="calculate()">=</button>



</div>


</div>



<div class="history-box">

<h3>Calculation History</h3>

<div id="historyList"></div>

<button onclick="clearHistory()">Clear History</button>

</div>


</div>



<script src="script.js"></script>


</body>

</html>
