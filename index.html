<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<button class="theme-btn" onclick="toggleTheme()">🌙</button>


<div class="container">


<div class="calculator">

<input id="display" readonly>


<div class="history">
<h3>History</h3>
<div id="historyList"></div>
<button onclick="clearHistory()">Clear History</button>
</div>



<div class="buttons">


<button class="special" onclick="clearDisplay()">AC</button>
<button class="special" onclick="deleteLast()">DEL</button>
<button onclick="appendValue('%')">%</button>
<button onclick="appendValue('/')">÷</button>


<button onclick="scientific('sin')">sin</button>
<button onclick="scientific('cos')">cos</button>
<button onclick="scientific('tan')">tan</button>
<button onclick="scientific('sqrt')">√</button>


<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('*')">×</button>


<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('-')">−</button>


<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="appendValue('+')">+</button>


<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button onclick="appendValue(Math.PI)">π</button>
<button class="equal" onclick="calculate()">=</button>


</div>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
